# wshowlyrics GitHub Pages Configuration
title: wshowlyrics
description: A Wayland-native lyrics overlay with MPRIS integration
url: "https://wshowlyrics.github.io"
baseurl: "/wshowlyrics"

# Build settings
markdown: kramdown
highlighter: rouge

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock

# Site info
author: unstable-code
github_username: wshowlyrics
repository: wshowlyrics/wshowlyrics

# Social/SEO
twitter:
  card: summary_large_image
social:
  name: wshowlyrics
  links:
    - https://github.com/wshowlyrics/wshowlyrics

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: default
