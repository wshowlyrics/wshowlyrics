name: Release to AUR

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  verify-build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            meson \
            ninja \
            wayland \
            wayland-protocols \
            cairo \
            pango \
            fontconfig \
            curl \
            libappindicator-gtk3 \
            gdk-pixbuf2 \
            openssl \
            pkg-config

      - name: Setup build directory
        run: meson setup build

      - name: Compile
        run: meson compile -C build

      - name: Verify binary exists
        run: |
          if [ ! -f build/lyrics ]; then
            echo "Error: lyrics binary not found"
            exit 1
          fi
          echo "Build successful: lyrics binary created"
          ls -lh build/lyrics

      - name: Verify binary format
        run: |
          if file build/lyrics | grep -q "ELF.*executable"; then
            echo "Binary format verified: ELF executable"
          else
            echo "Error: Invalid binary format"
            exit 1
          fi

      - name: Verify installation files
        run: |
          # Verify that all required files for installation exist
          if [ ! -f wshowlyrics.service ]; then
            echo "Error: wshowlyrics.service not found"
            exit 1
          fi

          # Verify systemd service file syntax
          if ! grep -q "ExecStart=/usr/bin/wshowlyrics" wshowlyrics.service; then
            echo "Error: Invalid service file content"
            exit 1
          fi

          echo "Installation files verified"

          # Test dry-run installation to verify meson install configuration
          meson install -C build --dry-run --no-rebuild | tee install-check.log

          # Verify service file will be installed
          if ! grep -q "wshowlyrics.service to /usr/lib/systemd/user" install-check.log; then
            echo "Error: Service file not configured for installation"
            exit 1
          fi

          echo "Installation configuration verified"

  aur-release:
    needs: verify-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lyrics repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          # Get tag from push event
          TAG="${GITHUB_REF#refs/tags/}"

          # Remove 'v' prefix from tag (v0.1.0 -> 0.1.0)
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION from tag: $TAG"

      - name: Setup SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" | base64 -d > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Checkout AUR repository (wshowlyrics)
        run: |
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur -o StrictHostKeyChecking=accept-new" git clone ssh://aur@aur.archlinux.org/wshowlyrics.git aur

      - name: Create or Update PKGBUILD
        run: |
          cd aur

          # If PKGBUILD doesn't exist, create it
          if [ ! -f PKGBUILD ]; then
            cat > PKGBUILD << 'EOF'
          # Maintainer: unstable-code <assa0620@gmail.com>
          pkgname=wshowlyrics
          pkgver=0.1.0
          pkgrel=1
          pkgdesc="Wayland-native lyrics display for MPD with online fallback"
          arch=('x86_64')
          url="https://github.com/unstable-code/lyrics"
          license=('GPL-3.0-or-later')
          depends=('wayland' 'cairo' 'pango' 'curl' 'fontconfig' 'libappindicator-gtk3' 'gdk-pixbuf2' 'playerctl')
          optdepends=('snixembed: System tray support for Swaybar')
          makedepends=('meson' 'ninja' 'wayland-protocols')
          source=("$pkgname-$pkgver.tar.gz::$url/archive/v$pkgver.tar.gz")
          sha256sums=('SKIP')

          build() {
              cd "lyrics-$pkgver"
              meson setup build --prefix=/usr
              meson compile -C build
          }

          package() {
              cd "lyrics-$pkgver"
              meson install -C build --destdir="$pkgdir"
          }
          EOF
          fi

          # Update version and reset pkgrel
          sed -i "s/^pkgver=.*/pkgver=${{ steps.get_version.outputs.version }}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

      - name: Generate .SRCINFO
        run: |
          USER_ID=$(id -u)
          GROUP_ID=$(id -g)
          docker run --rm -v "${{ github.workspace }}/aur:/pkg" archlinux:latest bash -c "
            pacman -Sy --noconfirm --needed base-devel git sudo
            useradd -m builder
            chown -R builder:builder /pkg
            cd /pkg
            sudo -u builder makepkg --printsrcinfo > .SRCINFO
            chown -R $USER_ID:$GROUP_ID /pkg
          "

      - name: Commit and push to AUR
        run: |
          cd aur
          git config user.name "unstable-code"
          git config user.email "assa0620@gmail.com"
          git add PKGBUILD .SRCINFO
          git diff --staged --quiet || git commit -m "Update to version ${{ steps.get_version.outputs.version }}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur -o StrictHostKeyChecking=accept-new" git push origin master

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          body: |
            ## Release ${{ steps.get_version.outputs.version }}

            This release has been automatically deployed to AUR as `wshowlyrics`.

            ### Installation
            ```bash
            yay -S wshowlyrics
            ```
          generate_release_notes: true
