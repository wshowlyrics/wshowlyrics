name: Release to AUR

on:
  workflow_run:
    workflows: ["Security Scan"]
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: aur-release
  cancel-in-progress: false

jobs:
  aur-release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Security check - Reject forks
        run: |
          if [ "${{ github.event.workflow_run.head_repository.full_name }}" != "${{ github.repository }}" ]; then
            echo "::error::Security: Refusing to run workflow from fork"
            echo "Fork repository: ${{ github.event.workflow_run.head_repository.full_name }}"
            echo "Expected repository: ${{ github.repository }}"
            exit 1
          fi

      - name: Checkout lyrics repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          # Check if current commit has a version tag
          TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          if [ -z "$TAG" ]; then
            echo "has_tag=false" >> $GITHUB_OUTPUT
            echo "No version tag found on this commit, skipping release"
          else
            echo "has_tag=true" >> $GITHUB_OUTPUT
            VERSION="${TAG#v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "Releasing version: $VERSION from tag: $TAG"
          fi

      - name: Setup SSH for AUR
        if: steps.get_version.outputs.has_tag == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" | base64 -d > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Checkout AUR repository (wshowlyrics)
        if: steps.get_version.outputs.has_tag == 'true'
        run: |
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur -o StrictHostKeyChecking=accept-new" git clone ssh://aur@aur.archlinux.org/wshowlyrics.git aur

      - name: Update PKGBUILD version
        if: steps.get_version.outputs.has_tag == 'true'
        run: |
          cd aur

          # Update version and reset pkgrel
          sed -i "s/^pkgver=.*/pkgver=${{ steps.get_version.outputs.version }}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

      - name: Update checksums and generate .SRCINFO
        if: steps.get_version.outputs.has_tag == 'true'
        run: |
          USER_ID=$(id -u)
          GROUP_ID=$(id -g)
          docker run --rm -v "${{ github.workspace }}/aur:/pkg" archlinux:latest bash -c "
            pacman -Sy --noconfirm --needed base-devel git sudo pacman-contrib
            useradd -m builder
            chown -R builder:builder /pkg
            cd /pkg
            sudo -u builder updpkgsums
            sudo -u builder makepkg --printsrcinfo > .SRCINFO
            chown -R $USER_ID:$GROUP_ID /pkg
          "

      - name: Commit and push to AUR
        if: steps.get_version.outputs.has_tag == 'true'
        run: |
          cd aur
          git config user.name "unstable-code"
          git config user.email "assa0620@gmail.com"
          git add PKGBUILD .SRCINFO
          git diff --staged --quiet || git commit -m "Update to version ${{ steps.get_version.outputs.version }}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur -o StrictHostKeyChecking=accept-new" git push origin master

      - name: Create GitHub Release
        if: steps.get_version.outputs.has_tag == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          body: |
            ## Release ${{ steps.get_version.outputs.version }}

            This release has been automatically deployed to AUR as `wshowlyrics`.

            ### Installation
            ```bash
            yay -S wshowlyrics
            ```
          generate_release_notes: true
