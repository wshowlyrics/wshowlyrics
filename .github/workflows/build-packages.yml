name: Build Release Packages

on:
  workflow_run:
    workflows: ["Security Scan"]
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: build-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      has_tag: ${{ steps.check_tag.outputs.has_tag }}
      version: ${{ steps.check_tag.outputs.version }}
      tag: ${{ steps.check_tag.outputs.tag }}
    steps:
      - name: Security check - Reject forks
        run: |
          if [ "${{ github.event.workflow_run.head_repository.full_name }}" != "${{ github.repository }}" ]; then
            echo "::error::Security: Refusing to run workflow from fork"
            echo "Fork repository: ${{ github.event.workflow_run.head_repository.full_name }}"
            echo "Expected repository: ${{ github.repository }}"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Check for release tag
        id: check_tag
        run: |
          TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          if [ -z "$TAG" ]; then
            echo "has_tag=false" >> $GITHUB_OUTPUT
            echo "No release tag found, skipping package build"
          else
            echo "has_tag=true" >> $GITHUB_OUTPUT
            VERSION="${TAG#v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "Release tag found: $TAG (version: $VERSION)"
          fi

  build-deb:
    needs: prepare-build
    if: needs.prepare-build.outputs.has_tag == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install build dependencies (Ubuntu 22.04)
        run: |
          docker run --rm -v "$PWD:/workspace" ubuntu:22.04 bash -c "
            apt-get update
            apt-get install -y \
              meson ninja-build \
              libwayland-dev wayland-protocols \
              libcairo2-dev libpango1.0-dev \
              libcurl4-openssl-dev libfontconfig1-dev \
              libappindicator3-dev libgdk-pixbuf-2.0-dev \
              libjson-c-dev libssl-dev \
              dpkg-dev dpkg-sig
          "

      - name: Build with Meson
        run: |
          docker run --rm -v "$PWD:/workspace" -w /workspace ubuntu:22.04 bash -c "
            apt-get update -qq
            apt-get install -y -qq \
              meson ninja-build \
              libwayland-dev wayland-protocols \
              libcairo2-dev libpango1.0-dev \
              libcurl4-openssl-dev libfontconfig1-dev \
              libappindicator3-dev libgdk-pixbuf-2.0-dev \
              libjson-c-dev libssl-dev
            meson setup build --prefix=/usr
            meson compile -C build
          "

      - name: Create package structure
        run: |
          VERSION="${{ needs.prepare-build.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          PKG_DIR="wshowlyrics_${VERSION}_${ARCH}"

          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/usr/bin"
          mkdir -p "${PKG_DIR}/etc/wshowlyrics"
          mkdir -p "${PKG_DIR}/usr/lib/systemd/user"
          mkdir -p "${PKG_DIR}/usr/share/doc/wshowlyrics"

          # Copy binary
          cp build/lyrics "${PKG_DIR}/usr/bin/wshowlyrics"

          # Copy helper script
          cp wshowlyrics-offset "${PKG_DIR}/usr/bin/wshowlyrics-offset"
          chmod 755 "${PKG_DIR}/usr/bin/wshowlyrics-offset"

          # Copy config
          cp settings.ini.example "${PKG_DIR}/etc/wshowlyrics/settings.ini"

          # Copy systemd service
          cp wshowlyrics.service "${PKG_DIR}/usr/lib/systemd/user/"

          # Copy documentation
          cp README.md LICENSE "${PKG_DIR}/usr/share/doc/wshowlyrics/"

          # Create DEBIAN/control
          cat > "${PKG_DIR}/DEBIAN/control" << EOF
          Package: wshowlyrics
          Version: ${VERSION}
          Section: sound
          Priority: optional
          Architecture: ${ARCH}
          Depends: libwayland-client0, libcairo2, libpango-1.0-0, libcurl4, libfontconfig1, libappindicator3-1, libgdk-pixbuf-2.0-0, libglib2.0-0, libjson-c5, libssl3
          Recommends: sway | hyprland
          Maintainer: unstable-code <assa0620@gmail.com>
          Description: Wayland-native lyrics display with online fallback
           wshowlyrics is a lightweight lyrics overlay for Wayland compositors
           that displays synchronized lyrics for currently playing music.
           .
           Features:
            - MPRIS2 integration for music player detection
            - Local lyrics file support (.lrc, .lrcx, .srt)
            - Online lyrics fetching from lrclib.net
            - Karaoke-style word-level timing
            - AI-powered translation support
            - System tray integration with album art
          Homepage: https://github.com/unstable-code/lyrics
          EOF

          # Create postinst script
          cat > "${PKG_DIR}/DEBIAN/postinst" << 'EOF'
          #!/bin/sh
          set -e

          if [ "$1" = "configure" ]; then
              # Reload systemd user daemon
              if command -v systemctl >/dev/null 2>&1; then
                  systemctl --user daemon-reload 2>/dev/null || true
              fi
          fi

          exit 0
          EOF
          chmod 755 "${PKG_DIR}/DEBIAN/postinst"

      - name: Build .deb package
        run: |
          VERSION="${{ needs.prepare-build.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          PKG_DIR="wshowlyrics_${VERSION}_${ARCH}"

          dpkg-deb --build "${PKG_DIR}"

      - name: Import GPG key and sign package
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq devscripts

          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --yes --import

          VERSION="${{ needs.prepare-build.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          DEB_FILE="wshowlyrics_${VERSION}_${ARCH}.deb"

          # Sign the .deb file using debsigs (requires debsigs package)
          sudo apt-get install -y -qq debsigs
          debsigs --sign=origin -k B4CD9B155AA3124C "${DEB_FILE}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: wshowlyrics_${{ needs.prepare-build.outputs.version }}_${{ matrix.arch }}.deb
          retention-days: 7

  build-rpm:
    needs: prepare-build
    if: needs.prepare-build.outputs.has_tag == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Create .spec file
        run: |
          VERSION="${{ needs.prepare-build.outputs.version }}"

          cat > wshowlyrics.spec << 'SPECEOF'
          # Disable debug packages
          %global debug_package %{nil}

          Name:           wshowlyrics
          Version:        VERSION_PLACEHOLDER
          Release:        1%{?dist}
          Summary:        Wayland-native lyrics display with online fallback

          License:        GPL-3.0-or-later
          URL:            https://github.com/unstable-code/lyrics
          Source0:        %{name}-%{version}.tar.gz

          BuildRequires:  meson >= 0.48.0
          BuildRequires:  ninja-build
          BuildRequires:  gcc
          BuildRequires:  wayland-devel
          BuildRequires:  wayland-protocols-devel
          BuildRequires:  cairo-devel
          BuildRequires:  pango-devel
          BuildRequires:  libcurl-devel
          BuildRequires:  fontconfig-devel
          BuildRequires:  libappindicator-gtk3-devel
          BuildRequires:  gdk-pixbuf2-devel
          BuildRequires:  json-c-devel
          BuildRequires:  openssl-devel

          Requires:       wayland
          Requires:       cairo
          Requires:       pango
          Requires:       libcurl
          Requires:       fontconfig
          Requires:       libappindicator-gtk3
          Requires:       gdk-pixbuf2
          Requires:       glib2
          Requires:       json-c
          Requires:       openssl-libs

          Recommends:     sway

          %description
          wshowlyrics is a lightweight lyrics overlay for Wayland compositors
          that displays synchronized lyrics for currently playing music.

          Features:
          - MPRIS2 integration for music player detection
          - Local lyrics file support (.lrc, .lrcx, .srt)
          - Online lyrics fetching from lrclib.net
          - Karaoke-style word-level timing
          - AI-powered translation support
          - System tray integration with album art

          %prep
          %autosetup

          %build
          %meson
          %meson_build

          %install
          %meson_install
          mv %{buildroot}%{_bindir}/lyrics %{buildroot}%{_bindir}/wshowlyrics

          %post
          %systemd_user_post wshowlyrics.service

          %preun
          %systemd_user_preun wshowlyrics.service

          %files
          %license LICENSE
          %doc README.md
          %{_bindir}/wshowlyrics
          %{_bindir}/wshowlyrics-offset
          %config(noreplace) %{_sysconfdir}/wshowlyrics/settings.ini
          %{_userunitdir}/wshowlyrics.service

          %changelog
          * DATE_PLACEHOLDER unstable-code <assa0620@gmail.com> - VERSION_PLACEHOLDER-1
          - Release VERSION_PLACEHOLDER
          SPECEOF

          CHANGELOG_DATE=$(date +"%a %b %d %Y")
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" wshowlyrics.spec
          sed -i "s/DATE_PLACEHOLDER/${CHANGELOG_DATE}/g" wshowlyrics.spec

      - name: Create source tarball
        run: |
          VERSION="${{ needs.prepare-build.outputs.version }}"
          git archive --format=tar.gz --prefix="wshowlyrics-${VERSION}/" \
            -o "wshowlyrics-${VERSION}.tar.gz" HEAD

      - name: Build RPM package in Fedora container
        run: |
          VERSION="${{ needs.prepare-build.outputs.version }}"
          ARCH="${{ matrix.arch }}"

          docker run --rm -v "$PWD:/workspace" -w /workspace \
            --platform linux/${{ matrix.arch == 'x86_64' && 'amd64' || 'arm64' }} \
            fedora:latest bash -c "
            dnf install -y rpm-build rpmdevtools dnf-plugins-core
            dnf builddep -y wshowlyrics.spec

            mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
            cp wshowlyrics-${VERSION}.tar.gz ~/rpmbuild/SOURCES/
            cp wshowlyrics.spec ~/rpmbuild/SPECS/

            rpmbuild -ba ~/rpmbuild/SPECS/wshowlyrics.spec

            cp ~/rpmbuild/RPMS/${ARCH}/wshowlyrics-*.rpm /workspace/
          "

      - name: Fix permissions for RPM files
        run: |
          # Change ownership and permissions for files created in Docker container
          sudo chown $(id -u):$(id -g) wshowlyrics-*.rpm
          chmod 644 wshowlyrics-*.rpm

      - name: Import GPG key and sign RPM
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --yes --import

          rpm --addsign --define "_gpg_name B4CD9B155AA3124C" wshowlyrics-*.rpm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.arch }}
          path: wshowlyrics-*.rpm
          retention-days: 7

  build-appimage:
    needs: prepare-build
    if: needs.prepare-build.outputs.has_tag == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Build AppImage in Ubuntu 22.04 container
        run: |
          VERSION="${{ needs.prepare-build.outputs.version }}"
          ARCH="${{ matrix.arch }}"

          docker run --rm -v "$PWD:/workspace" -w /workspace \
            --platform linux/${{ matrix.arch == 'x86_64' && 'amd64' || 'arm64' }} \
            ubuntu:22.04 bash -c "
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq
            apt-get install -y -qq \
              meson ninja-build \
              libwayland-dev wayland-protocols \
              libcairo2-dev libpango1.0-dev \
              libcurl4-openssl-dev libfontconfig1-dev \
              libappindicator3-dev libgdk-pixbuf-2.0-dev \
              libjson-c-dev libssl-dev libglib2.0-dev \
              file wget desktop-file-utils

            # Build with meson
            meson setup build --prefix=/usr
            meson compile -C build
            DESTDIR=/workspace/AppDir meson install -C build

            # Rename binary
            mv /workspace/AppDir/usr/bin/lyrics /workspace/AppDir/usr/bin/wshowlyrics

            # Download linuxdeploy
            wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${ARCH}.AppImage
            chmod +x linuxdeploy-${ARCH}.AppImage
            ./linuxdeploy-${ARCH}.AppImage --appimage-extract

            # Create AppImage with proper desktop/icon files
            ARCH=${ARCH} ./squashfs-root/AppRun \
              --appdir AppDir \
              --executable AppDir/usr/bin/wshowlyrics \
              --desktop-file AppDir/usr/share/applications/wshowlyrics.desktop \
              --icon-file AppDir/usr/share/icons/hicolor/scalable/apps/wshowlyrics.svg \
              --output appimage
          "

          # Rename AppImage to include version
          mv wshowlyrics-*.AppImage wshowlyrics-${VERSION}-${ARCH}.AppImage

      - name: Import GPG key and sign AppImage
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --yes --import

          VERSION="${{ needs.prepare-build.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          APPIMAGE_FILE="wshowlyrics-${VERSION}-${ARCH}.AppImage"

          # Create detached signature
          gpg --batch --yes --armor --detach-sign --default-key B4CD9B155AA3124C "${APPIMAGE_FILE}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: appimage-${{ matrix.arch }}
          path: |
            wshowlyrics-${{ needs.prepare-build.outputs.version }}-${{ matrix.arch }}.AppImage
            wshowlyrics-${{ needs.prepare-build.outputs.version }}-${{ matrix.arch }}.AppImage.asc
          retention-days: 7

  upload-to-release:
    needs: [prepare-build, build-deb, build-rpm, build-appimage]
    if: needs.prepare-build.outputs.has_tag == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize artifacts
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-build.outputs.tag }}
          files: release-assets/*
          body: |
            ## Release ${{ needs.prepare-build.outputs.version }}

            ### Installation

            #### Debian/Ubuntu (.deb)
            ```bash
            # Download the appropriate .deb file for your architecture
            sudo dpkg -i wshowlyrics_${{ needs.prepare-build.outputs.version }}_amd64.deb
            sudo apt-get install -f  # Install dependencies
            ```

            #### Fedora/RHEL (.rpm)
            ```bash
            # Download the appropriate .rpm file for your architecture
            sudo dnf install wshowlyrics-${{ needs.prepare-build.outputs.version }}-1.fc*.rpm
            ```

            #### Universal (AppImage)
            ```bash
            # Download the appropriate AppImage file for your architecture
            chmod +x wshowlyrics-${{ needs.prepare-build.outputs.version }}-x86_64.AppImage
            ./wshowlyrics-${{ needs.prepare-build.outputs.version }}-x86_64.AppImage
            ```

            ### Package Verification

            All packages are signed with GPG key `B4CD9B155AA3124C`.

            #### Verify .deb
            ```bash
            dpkg-sig --verify wshowlyrics_${{ needs.prepare-build.outputs.version }}_amd64.deb
            ```

            #### Verify .rpm
            ```bash
            rpm --checksig wshowlyrics-${{ needs.prepare-build.outputs.version }}-1.fc*.rpm
            ```

            #### Verify AppImage
            ```bash
            gpg --verify wshowlyrics-${{ needs.prepare-build.outputs.version }}-x86_64.AppImage.asc \
                         wshowlyrics-${{ needs.prepare-build.outputs.version }}-x86_64.AppImage
            ```
          generate_release_notes: true
