name: Security Scan

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  secret-scan:
    name: Secret Scanning
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Scan full git history for secrets

      - name: Run Gitleaks with Docker
        run: |
          docker run -v ${{ github.workspace }}:/repo \
            zricethezav/gitleaks:latest \
            detect --source="/repo" --verbose --no-git

  sast-semgrep:
    name: SAST - Semgrep
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # For uploading SARIF results
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip3 install semgrep

      - name: Run Semgrep and generate SARIF
        run: |
          semgrep ci \
            --config p/security-audit \
            --config p/c \
            --config p/ci \
            --sarif > semgrep.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}  # Optional: for Semgrep Cloud

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif

  sast-cppcheck:
    name: SAST - Cppcheck
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # For uploading SARIF results
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install latest Cppcheck with SARIF support
        run: |
          # Cppcheck 2.16+ has native SARIF support
          wget -q https://github.com/danmar/cppcheck/releases/download/2.16.0/cppcheck-2.16.0-x86_64-linux.tar.xz
          tar xf cppcheck-2.16.0-x86_64-linux.tar.xz
          export PATH="${{ github.workspace }}/cppcheck-2.16.0/bin:$PATH"
          echo "${{ github.workspace }}/cppcheck-2.16.0/bin" >> $GITHUB_PATH
          # Verify installation
          cppcheck --version

      - name: Run Cppcheck with SARIF output
        run: |
          # Run Cppcheck and generate SARIF
          ${{ github.workspace }}/cppcheck-2.16.0/bin/cppcheck --enable=all \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            --std=c11 --platform=unix64 \
            --inline-suppr \
            --error-exitcode=0 \
            --output-format=sarif \
            --output-file=cppcheck.sarif \
            src/

          # Verify SARIF file was created
          if [ ! -f cppcheck.sarif ]; then
            echo "Error: cppcheck.sarif was not created"
            echo "Creating empty SARIF file to prevent upload failure"
            echo '{"version":"2.1.0","runs":[]}' > cppcheck.sarif
          fi

          # Show file size for debugging
          ls -lh cppcheck.sarif

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: cppcheck.sarif
          category: cppcheck
