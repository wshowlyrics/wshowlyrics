name: Security Scan

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  secret-scan:
    name: Secret Scanning
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Scan full git history for secrets

      - name: Run Gitleaks with Docker
        run: |
          docker run -v ${{ github.workspace }}:/repo \
            zricethezav/gitleaks:latest \
            detect --source="/repo" --verbose --no-git

  sast-semgrep:
    name: SAST - Semgrep
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # For uploading SARIF results
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip3 install semgrep

      - name: Run Semgrep and generate SARIF
        run: |
          semgrep ci \
            --config p/security-audit \
            --config p/c \
            --config p/ci \
            --sarif > semgrep.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}  # Optional: for Semgrep Cloud

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif

  sast-cppcheck:
    name: SAST - Cppcheck
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # For uploading SARIF results
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run Cppcheck
        run: |
          cppcheck --enable=all \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            --std=c11 --platform=unix64 \
            --inline-suppr \
            --error-exitcode=0 \
            --xml --xml-version=2 \
            --output-file=cppcheck.xml \
            src/

      - name: Convert to SARIF
        run: |
          pip install cppcheck-codequality
          cppcheck-codequality \
            --input-file=cppcheck.xml \
            --output-file=cppcheck.sarif

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: cppcheck.sarif
          category: cppcheck
