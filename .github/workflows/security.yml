name: Security Scan

on:
  workflow_run:
    workflows: ["CI", "Fuzz Testing"]
    types:
      - completed

jobs:
  gate:
    name: Verify CI + Fuzz
    runs-on: ubuntu-latest
    steps:
      - name: Check both workflows succeeded
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=${{ github.event.workflow_run.head_sha }}
          REPO=${{ github.repository }}

          CI_CONCLUSION=$(gh api "repos/$REPO/actions/workflows/ci.yml/runs?head_sha=$SHA&status=completed" \
            --jq '.workflow_runs[0].conclusion // empty')
          FUZZ_CONCLUSION=$(gh api "repos/$REPO/actions/workflows/fuzz.yml/runs?head_sha=$SHA&status=completed" \
            --jq '.workflow_runs[0].conclusion // empty')

          echo "CI=$CI_CONCLUSION, Fuzz=$FUZZ_CONCLUSION"

          if [[ "$CI_CONCLUSION" == "success" && "$FUZZ_CONCLUSION" == "success" ]]; then
            echo "Both workflows succeeded — proceeding"
          else
            echo "::error::CI=$CI_CONCLUSION, Fuzz=$FUZZ_CONCLUSION — both must succeed"
            exit 1
          fi

  secret-scan:
    name: Secret Scanning
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Scan full git history for secrets

      - name: Run Gitleaks with Docker
        run: |
          docker run -v ${{ github.workspace }}:/repo \
            zricethezav/gitleaks:latest \
            detect --source="/repo" --verbose --no-git

  sast-semgrep:
    name: SAST - Semgrep
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # For uploading SARIF results
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip3 install semgrep

      - name: Run Semgrep and generate SARIF
        run: |
          semgrep ci \
            --config p/security-audit \
            --config p/c \
            --config p/ci \
            --sarif > semgrep.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}  # Optional: for Semgrep Cloud

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif
