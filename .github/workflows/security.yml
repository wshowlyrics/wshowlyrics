name: Security Scan

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  secret-scan:
    name: Secret Scanning
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Scan full git history for secrets

      - name: Run Gitleaks with Docker
        run: |
          docker run -v ${{ github.workspace }}:/repo \
            zricethezav/gitleaks:latest \
            detect --source="/repo" --verbose --no-git

  sast-semgrep:
    name: SAST - Semgrep
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # For uploading SARIF results
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip3 install semgrep

      - name: Run Semgrep and generate SARIF
        run: |
          semgrep ci \
            --config p/security-audit \
            --config p/c \
            --config p/ci \
            --sarif > semgrep.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}  # Optional: for Semgrep Cloud

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif

  sast-codeql:
    name: SAST - CodeQL
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          queries: security-and-quality

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build \
            libcairo2-dev libpango1.0-dev \
            libwayland-dev wayland-protocols \
            libcurl4-openssl-dev \
            libappindicator3-dev libgdk-pixbuf2.0-dev \
            libfontconfig1-dev \
            libssl-dev \
            libjson-c-dev

      - name: Build with CodeQL
        run: |
          meson setup build
          meson compile -C build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:cpp"
