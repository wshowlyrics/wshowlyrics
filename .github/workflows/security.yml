name: Security Scan

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  secret-scan:
    name: Secret Scanning
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Scan full git history for secrets

      - name: Run Gitleaks with Docker
        run: |
          docker run -v ${{ github.workspace }}:/repo \
            zricethezav/gitleaks:latest \
            detect --source="/repo" --verbose --no-git

  sast-semgrep:
    name: SAST - Semgrep
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # For uploading SARIF results
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip3 install semgrep

      - name: Run Semgrep and generate SARIF
        run: |
          semgrep ci \
            --config p/security-audit \
            --config p/c \
            --config p/ci \
            --sarif > semgrep.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}  # Optional: for Semgrep Cloud

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif

  sast-cppcheck:
    name: SAST - Cppcheck
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # For uploading SARIF results
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Cppcheck from source with SARIF support
        run: |
          # Install build dependencies
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libpcre3-dev

          # Clone and build Cppcheck 2.16.0
          git clone --depth 1 --branch 2.16.0 https://github.com/danmar/cppcheck.git
          cd cppcheck
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          sudo make install

          # Verify installation
          cppcheck --version

      - name: Run Cppcheck with SARIF output
        run: |
          # Run Cppcheck and generate SARIF
          cppcheck --enable=all \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            --std=c11 --platform=unix64 \
            --inline-suppr \
            --error-exitcode=0 \
            --output-format=sarif \
            --output-file=cppcheck-raw.sarif \
            src/

          # Verify SARIF file was created
          if [ ! -f cppcheck-raw.sarif ]; then
            echo "Error: cppcheck-raw.sarif was not created"
            echo "Creating empty SARIF file to prevent upload failure"
            echo '{"version":"2.1.0","runs":[]}' > cppcheck.sarif
            exit 0
          fi

          # Fix SARIF: Cppcheck 2.16.0 outputs startColumn=0, but SARIF requires >= 1
          python3 << 'EOF'
import json
import sys

with open('cppcheck-raw.sarif', 'r') as f:
    sarif = json.load(f)

# Fix invalid column numbers (must be >= 1)
for run in sarif.get('runs', []):
    for result in run.get('results', []):
        for location in result.get('locations', []):
            physical = location.get('physicalLocation', {})
            region = physical.get('region', {})

            # Fix startColumn
            if 'startColumn' in region and region['startColumn'] < 1:
                region['startColumn'] = 1

            # Fix endColumn
            if 'endColumn' in region and region['endColumn'] < 1:
                region['endColumn'] = 1

with open('cppcheck.sarif', 'w') as f:
    json.dump(sarif, f, indent=2)

print("Fixed SARIF column numbers")
EOF

          # Show file size for debugging
          ls -lh cppcheck.sarif

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: cppcheck.sarif
          category: cppcheck
