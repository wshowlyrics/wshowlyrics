name: Upload to Launchpad PPA

on:
  workflow_run:
    workflows: ["Security Scan"]
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: ppa-upload
  cancel-in-progress: false

jobs:
  upload-ppa:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ubuntu_release:
          - name: jammy
            codename: "22.04 LTS"
          - name: noble
            codename: "24.04 LTS"
    steps:
      - name: Security check - Reject forks
        run: |
          if [ "${{ github.event.workflow_run.head_repository.full_name }}" != "${{ github.repository }}" ]; then
            echo "::error::Security: Refusing to run workflow from fork"
            echo "Fork repository: ${{ github.event.workflow_run.head_repository.full_name }}"
            echo "Expected repository: ${{ github.repository }}"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Check for release tag
        id: check_tag
        run: |
          TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          if [ -z "$TAG" ]; then
            echo "has_tag=false" >> $GITHUB_OUTPUT
            echo "No release tag found, skipping PPA upload"
          else
            echo "has_tag=true" >> $GITHUB_OUTPUT
            VERSION="${TAG#v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "Release tag found: $TAG (version: $VERSION)"
          fi

      - name: Install build dependencies
        if: steps.check_tag.outputs.has_tag == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper dput-ng

      - name: Create debian directory structure
        if: steps.check_tag.outputs.has_tag == 'true'
        run: |
          mkdir -p debian/source

          # debian/control
          cat > debian/control << 'EOF'
          Source: wshowlyrics
          Section: sound
          Priority: optional
          Maintainer: unstable-code <assa0620@gmail.com>
          Build-Depends: debhelper-compat (= 13),
                         meson (>= 0.48.0),
                         ninja-build,
                         libwayland-dev,
                         wayland-protocols,
                         libcairo2-dev,
                         libpango1.0-dev,
                         libcurl4-openssl-dev,
                         libfontconfig1-dev,
                         libappindicator3-dev,
                         libgdk-pixbuf-2.0-dev,
                         libjson-c-dev,
                         libssl-dev
          Standards-Version: 4.6.0
          Homepage: https://github.com/unstable-code/lyrics
          Vcs-Git: https://github.com/unstable-code/lyrics.git
          Vcs-Browser: https://github.com/unstable-code/lyrics

          Package: wshowlyrics
          Architecture: any
          Depends: ${shlibs:Depends}, ${misc:Depends}, playerctl
          Recommends: sway | hyprland
          Description: Wayland-native lyrics display with online fallback
           wshowlyrics is a lightweight lyrics overlay for Wayland compositors
           that displays synchronized lyrics for currently playing music.
           .
           Features:
            - MPRIS2 integration for music player detection
            - Local lyrics file support (.lrc, .lrcx, .srt)
            - Online lyrics fetching from lrclib.net
            - Karaoke-style word-level timing
            - AI-powered translation support
            - System tray integration with album art
          EOF

          # debian/rules
          cat > debian/rules << 'EOF'
          #!/usr/bin/make -f

          %:
          	dh $@ --buildsystem=meson

          override_dh_auto_configure:
          	dh_auto_configure -- --prefix=/usr
          EOF
          chmod +x debian/rules

          # debian/copyright
          cat > debian/copyright << 'EOF'
          Format: https://www.debian.org/doc/packaging-manuals/copyright-format/1.0/
          Upstream-Name: wshowlyrics
          Upstream-Contact: unstable-code <assa0620@gmail.com>
          Source: https://github.com/unstable-code/lyrics

          Files: *
          Copyright: 2024-2025 unstable-code <assa0620@gmail.com>
          License: GPL-3.0-or-later

          License: GPL-3.0-or-later
           This program is free software: you can redistribute it and/or modify
           it under the terms of the GNU General Public License as published by
           the Free Software Foundation, either version 3 of the License, or
           (at your option) any later version.
           .
           This program is distributed in the hope that it will be useful,
           but WITHOUT ANY WARRANTY; without even the implied warranty of
           MERCHANTABILITY or FITNESS FOR A PARTICULAR PURPOSE.  See the
           GNU General Public License for more details.
           .
           You should have received a copy of the GNU General Public License
           along with this program.  If not, see <https://www.gnu.org/licenses/>.
           .
           On Debian systems, the complete text of the GNU General Public
           License version 3 can be found in "/usr/share/common-licenses/GPL-3".
          EOF

          # debian/compat
          echo "13" > debian/compat

          # debian/source/format
          echo "3.0 (quilt)" > debian/source/format

      - name: Update debian/changelog
        if: steps.check_tag.outputs.has_tag == 'true'
        run: |
          VERSION="${{ steps.check_tag.outputs.version }}"
          RELEASE="${{ matrix.ubuntu_release.name }}"

          dch --create \
              --package wshowlyrics \
              --newversion "${VERSION}-1~${RELEASE}1" \
              --distribution ${RELEASE} \
              "Release ${VERSION}" \
              --force-distribution

          dch --release ""

      - name: Import GPG key
        if: steps.check_tag.outputs.has_tag == 'true'
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --yes --import

          # Configure GPG for non-interactive use
          echo "use-agent" >> ~/.gnupg/gpg.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf

          # Start gpg-agent (ignore if already running)
          gpg-agent --daemon --allow-preset-passphrase || true

      - name: Build source package
        if: steps.check_tag.outputs.has_tag == 'true'
        run: |
          VERSION="${{ steps.check_tag.outputs.version }}"

          # Create orig tarball
          git archive --format=tar.gz --prefix="wshowlyrics-${VERSION}/" \
            -o "../wshowlyrics_${VERSION}.orig.tar.gz" HEAD

          # Build source package (skip dependency check with -d)
          debuild -S -sa -d -kB4CD9B155AA3124C

      - name: Setup dput configuration
        if: steps.check_tag.outputs.has_tag == 'true'
        run: |
          mkdir -p ~/.dput.d

          cat > ~/.dput.d/wshowlyrics-ppa.json << 'EOF'
          {
            "wshowlyrics-ppa": {
              "fqdn": "ppa.launchpad.net",
              "method": "ftp",
              "incoming": "~unstable-code/ubuntu/wshowlyrics/",
              "login": "anonymous",
              "allow_unsigned_uploads": false
            }
          }
          EOF

      - name: Upload to PPA
        if: steps.check_tag.outputs.has_tag == 'true'
        run: |
          VERSION="${{ steps.check_tag.outputs.version }}"
          RELEASE="${{ matrix.ubuntu_release.name }}"

          CHANGES_FILE="../wshowlyrics_${VERSION}-1~${RELEASE}1_source.changes"

          dput wshowlyrics-ppa "$CHANGES_FILE"

      - name: Build completion message
        if: steps.check_tag.outputs.has_tag == 'true'
        run: |
          echo "PPA upload for ${{ matrix.ubuntu_release.name }} (${{ matrix.ubuntu_release.codename }}) completed!"
          echo "Build status: https://launchpad.net/~unstable-code/+archive/ubuntu/wshowlyrics/+packages"
