name: CI

on:
  push:
    branches:
      - master
    paths:
      - '**.c'
      - '**.h'
      - 'meson.build'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - master
    paths:
      - '**.c'
      - '**.h'
      - 'meson.build'
      - '.github/workflows/ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm \
          base-devel \
          meson \
          ninja \
          wayland \
          wayland-protocols \
          cairo \
          pango \
          fontconfig \
          curl \
          libappindicator-gtk3 \
          gdk-pixbuf2 \
          openssl \
          pkg-config

    - name: Build using makepkg (AUR method)
      run: |
        # Use makepkg to replicate exact AUR build process
        # This catches all compiler warnings that would fail in AUR
        useradd -m builder
        chown -R builder:builder .

        # Create a temporary PKGBUILD that matches AUR build process
        cat > PKGBUILD << 'EOF'
        pkgname=wshowlyrics-ci
        pkgver=0.0.0
        pkgrel=1
        pkgdesc="CI build test"
        arch=('x86_64')
        license=('GPL-3.0-or-later')
        depends=('cairo' 'curl' 'fontconfig' 'openssl' 'pango' 'wayland' 'playerctl' 'libappindicator-gtk3' 'gdk-pixbuf2')
        makedepends=('meson' 'ninja' 'wayland-protocols')

        build() {
            cd "$srcdir"
            arch-meson . build
            meson compile -C build
        }

        check() {
            cd "$srcdir"
            test -f build/lyrics
        }

        package() {
            cd "$srcdir"
            install -Dm755 build/lyrics "$pkgdir/usr/bin/wshowlyrics"
            install -Dm644 settings.ini.example "$pkgdir/etc/wshowlyrics/settings.ini"
            install -Dm644 wshowlyrics.service "$pkgdir/usr/lib/systemd/user/wshowlyrics.service"
        }
        EOF

        # Run makepkg as non-root user with AUR's strict flags
        su builder -c "makepkg -f --noconfirm"

    - name: Verify binary exists
      run: |
        if [ ! -f src/build/lyrics ]; then
          echo "Error: lyrics binary not found"
          ls -la src/build/ || echo "src/build/ directory not found"
          exit 1
        fi
        echo "Build successful: lyrics binary created"
        ls -lh src/build/lyrics

    - name: Test help output
      run: |
        # Test that the binary can display help without crashing
        # This doesn't require a Wayland compositor
        ./src/build/lyrics -h || true
        echo "Help output test completed"

    - name: Test version check
      run: |
        # Simple smoke test to ensure binary runs
        if file src/build/lyrics | grep -q "ELF.*executable"; then
          echo "Binary format verified: ELF executable"
        else
          echo "Error: Invalid binary format"
          exit 1
        fi

    - name: Verify installation files
      run: |
        # Verify that all required files for installation exist
        if [ ! -f wshowlyrics.service ]; then
          echo "Error: wshowlyrics.service not found"
          exit 1
        fi

        # Verify systemd service file syntax
        if ! grep -q "ExecStart=/usr/bin/wshowlyrics" wshowlyrics.service; then
          echo "Error: Invalid service file content"
          exit 1
        fi

        echo "Installation files verified"

        # Verify package contents
        if [ -f *.pkg.tar.zst ]; then
          tar -tvf *.pkg.tar.zst | grep -E "(wshowlyrics|settings.ini|wshowlyrics.service)"
          echo "Package contents verified"
        fi
