name: CI

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'
    paths:
      - '**.c'
      - '**.h'
      - 'meson.build'
      - 'meson_options.txt'
      - 'fuzz/**'
      - '.github/**/*.yml'
  pull_request:
    branches:
      - master
    paths:
      - '**.c'
      - '**.h'
      - 'meson.build'
      - 'meson_options.txt'
      - 'fuzz/**'
      - '.github/**/*.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build and Test (x86_64)
    container:
      image: archlinux:latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install base dependencies
      run: |
        # Disable sandbox globally for Docker container compatibility
        sed -i '/^\[options\]/a DisableSandbox' /etc/pacman.conf
        pacman -Syu --noconfirm
        # Re-add DisableSandbox after pacman upgrade (pacman.conf may be replaced)
        grep -q '^DisableSandbox' /etc/pacman.conf || sed -i '/^\[options\]/a DisableSandbox' /etc/pacman.conf
        pacman -S --noconfirm base-devel git sudo

    - name: Build using makepkg (AUR method)
      run: |
        # Use makepkg to replicate exact AUR build process
        # This catches all compiler warnings that would fail in AUR

        # Download actual PKGBUILD from AUR repository
        git clone --depth=1 https://aur.archlinux.org/wshowlyrics-git.git /tmp/aur-pkg
        cp /tmp/aur-pkg/PKGBUILD .

        # Modify PKGBUILD for CI environment:
        # - Remove source (files already checked out)
        # - Change srcdir/lyrics to startdir (current checkout)
        sed -i 's|source=.*|source=()|' PKGBUILD
        sed -i 's|sha256sums=.*|sha256sums=()|' PKGBUILD
        sed -i 's|cd "$srcdir/lyrics"|cd "$startdir"|g' PKGBUILD

        # Create non-root user for makepkg
        useradd -m builder
        chown -R builder:builder .

        # Allow builder to run pacman without password (for makepkg -s)
        echo "builder ALL=(ALL) NOPASSWD: /usr/bin/pacman" >> /etc/sudoers

        # Run makepkg with automatic dependency resolution
        su builder -c "makepkg -sf --noconfirm"

    - name: Verify binary exists
      run: |
        if [ ! -f build/lyrics ]; then
          echo "Error: lyrics binary not found"
          ls -la build/ || echo "build/ directory not found"
          exit 1
        fi
        echo "Build successful: lyrics binary created"
        ls -lh build/lyrics

    - name: Test help output
      run: |
        # Test that the binary can display help without crashing
        # This doesn't require a Wayland compositor
        ./build/lyrics -h || true
        echo "Help output test completed"

    - name: Test version check
      run: |
        # Simple smoke test to ensure binary runs
        FILE_OUTPUT=$(file build/lyrics)
        echo "Binary info: $FILE_OUTPUT"

        if ! echo "$FILE_OUTPUT" | grep -q "ELF.*executable"; then
          echo "Error: Invalid binary format"
          exit 1
        fi

        # Verify architecture matches
        if ! echo "$FILE_OUTPUT" | grep -qE "x86-64|x86_64"; then
          echo "Error: Expected x86_64 binary but got: $FILE_OUTPUT"
          exit 1
        fi
        echo "Binary format verified: x86_64 ELF executable"

    - name: Verify installation files
      run: |
        # Verify that all required files for installation exist
        if [ ! -f wshowlyrics.service ]; then
          echo "Error: wshowlyrics.service not found"
          exit 1
        fi

        # Verify systemd service file syntax
        if ! grep -q "ExecStart=/usr/bin/wshowlyrics" wshowlyrics.service; then
          echo "Error: Invalid service file content"
          exit 1
        fi

        echo "Installation files verified"

        # Verify package contents
        if [ -f *.pkg.tar.zst ]; then
          tar -tvf *.pkg.tar.zst | grep -E "(wshowlyrics|settings.ini|wshowlyrics.service)"
          echo "Package contents verified"
        fi

  fuzz:
    runs-on: ubuntu-latest
    name: Fuzz Testing (libFuzzer + ASan)

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang meson ninja-build \
          libcairo2-dev libpango1.0-dev libwayland-dev wayland-protocols \
          libcurl4-openssl-dev libappindicator3-dev libgdk-pixbuf-2.0-dev \
          libssl-dev libjson-c-dev libglib2.0-dev

    - name: Build fuzz targets
      env:
        CC: clang
      run: |
        meson setup build-fuzz -Dfuzzing=true
        meson compile -C build-fuzz

    - name: Run fuzz_lrc
      run: |
        mkdir -p fuzz/artifacts/lrc
        ./build-fuzz/fuzz_lrc fuzz/corpus/lrc/ \
          -artifact_prefix=fuzz/artifacts/lrc/ \
          -max_total_time=60 \
          -print_final_stats=1

    - name: Run fuzz_lrcx
      run: |
        mkdir -p fuzz/artifacts/lrcx
        ./build-fuzz/fuzz_lrcx fuzz/corpus/lrcx/ \
          -artifact_prefix=fuzz/artifacts/lrcx/ \
          -max_total_time=60 \
          -print_final_stats=1

    - name: Run fuzz_srt
      run: |
        mkdir -p fuzz/artifacts/srt
        ./build-fuzz/fuzz_srt fuzz/corpus/srt/ \
          -artifact_prefix=fuzz/artifacts/srt/ \
          -max_total_time=60 \
          -print_final_stats=1

    - name: Upload crash artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: fuzz-crashes
        path: fuzz/artifacts/
        retention-days: 30
