name: CI

on:
  push:
    branches:
      - master
    paths:
      - '**.c'
      - '**.h'
      - 'meson.build'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - master
    paths:
      - '**.c'
      - '**.h'
      - 'meson.build'
      - '.github/workflows/ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm \
          base-devel \
          meson \
          ninja \
          wayland \
          wayland-protocols \
          cairo \
          pango \
          fontconfig \
          curl \
          libappindicator-gtk3 \
          gdk-pixbuf2 \
          openssl \
          pkg-config

    - name: Setup build directory
      run: meson setup build

    - name: Compile
      run: meson compile -C build

    - name: Verify binary exists
      run: |
        if [ ! -f build/lyrics ]; then
          echo "Error: lyrics binary not found"
          exit 1
        fi
        echo "Build successful: lyrics binary created"
        ls -lh build/lyrics

    - name: Test help output
      run: |
        # Test that the binary can display help without crashing
        # This doesn't require a Wayland compositor
        ./build/lyrics -h || true
        echo "Help output test completed"

    - name: Test version check
      run: |
        # Simple smoke test to ensure binary runs
        if file build/lyrics | grep -q "ELF.*executable"; then
          echo "Binary format verified: ELF executable"
        else
          echo "Error: Invalid binary format"
          exit 1
        fi

    - name: Verify installation files
      run: |
        # Verify that all required files for installation exist
        if [ ! -f wshowlyrics.service ]; then
          echo "Error: wshowlyrics.service not found"
          exit 1
        fi

        # Verify systemd service file syntax
        if ! grep -q "ExecStart=/usr/bin/wshowlyrics" wshowlyrics.service; then
          echo "Error: Invalid service file content"
          exit 1
        fi

        echo "Installation files verified"

        # Test dry-run installation to verify meson install configuration
        meson install -C build --dry-run --no-rebuild | tee install-check.log

        # Verify service file will be installed
        if ! grep -q "wshowlyrics.service to /usr/lib/systemd/user" install-check.log; then
          echo "Error: Service file not configured for installation"
          exit 1
        fi

        echo "Installation configuration verified"
