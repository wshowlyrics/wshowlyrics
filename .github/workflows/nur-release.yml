name: Update NUR Stable

on:
  workflow_run:
    workflows: ["Security Scan"]
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: nur-release
  cancel-in-progress: false

jobs:
  nur-stable:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Security check - Reject forks
        run: |
          if [ "${{ github.event.workflow_run.head_repository.full_name }}" != "${{ github.repository }}" ]; then
            echo "::error::Security: Refusing to run workflow from fork"
            exit 1
          fi

      - name: Checkout lyrics repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$TAG" ]; then
            echo "has_tag=false" >> $GITHUB_OUTPUT
            echo "No version tag found on this commit, skipping release"
          else
            echo "has_tag=true" >> $GITHUB_OUTPUT
            VERSION="${TAG#v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "Releasing version: $VERSION from tag: $TAG"
          fi

      - name: Install Nix
        if: steps.get_version.outputs.has_tag == 'true'
        uses: cachix/install-nix-action@v31

      - name: Calculate Nix hash
        if: steps.get_version.outputs.has_tag == 'true'
        id: nix_hash
        run: |
          HASH_BASE32=$(nix-prefetch-url --unpack \
            "https://github.com/${{ github.repository }}/archive/${{ steps.get_version.outputs.tag }}.tar.gz" 2>&1 | tail -1)
          HASH_SRI=$(nix hash convert --hash-algo sha256 --to sri "$HASH_BASE32")
          echo "hash=$HASH_SRI" >> $GITHUB_OUTPUT
          echo "Nix SRI hash: $HASH_SRI"

      - name: Checkout NUR repository
        if: steps.get_version.outputs.has_tag == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/nur-packages
          token: ${{ secrets.NUR_PAT }}
          path: nur-packages

      - name: Update default.nix
        if: steps.get_version.outputs.has_tag == 'true'
        run: |
          cd nur-packages/pkgs/wshowlyrics

          sed -i 's|version = "[^"]*";|version = "${{ steps.get_version.outputs.version }}";|' default.nix
          sed -i 's|rev = "[^"]*";|rev = "${{ steps.get_version.outputs.tag }}";|' default.nix
          sed -i 's|hash = "[^"]*";|hash = "${{ steps.nix_hash.outputs.hash }}";|' default.nix

          echo "Updated default.nix:"
          grep -E "version|rev|hash" default.nix | head -3

      - name: Commit and push to NUR
        if: steps.get_version.outputs.has_tag == 'true'
        run: |
          cd nur-packages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pkgs/wshowlyrics/default.nix
          git diff --staged --quiet || git commit -m "wshowlyrics: ${{ steps.get_version.outputs.version }}"
          git push origin main || git push origin master
