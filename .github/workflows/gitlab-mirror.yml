name: GitLab Mirror

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Push to GitLab
        env:
          GITLAB_PAT: ${{ secrets.GITLAB_PAT }}
        run: |
          git remote add gitlab "https://oauth2:${GITLAB_PAT}@gitlab.com/unstable-code/lyrics.git"
          git push gitlab --all --force
          git push gitlab --tags --force
