name: Publish to AUR

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - master

jobs:
  aur-publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' && !(startsWith(github.event.workflow_run.head_branch, 'v') && contains(github.event.workflow_run.head_branch, '.')) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lyrics repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Get package version
        id: pkgver
        run: |
          VER=$(printf "r%s.%s" "$(git rev-list --count HEAD)" "$(git rev-parse --short HEAD)")
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Setup SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" | base64 -d > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Checkout AUR repository
        run: |
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur" git clone ssh://aur@aur.archlinux.org/wshowlyrics-git.git aur

      - name: Update PKGBUILD
        run: |
          cd aur
          sed -i "s/^pkgver=.*/pkgver=${{ steps.pkgver.outputs.version }}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

      - name: Generate .SRCINFO
        run: |
          USER_ID=$(id -u)
          GROUP_ID=$(id -g)
          docker run --rm -v "${{ github.workspace }}/aur:/pkg" archlinux:latest bash -c "
            pacman -Sy --noconfirm --needed base-devel git sudo
            useradd -m builder
            chown -R builder:builder /pkg
            cd /pkg
            sudo -u builder makepkg --printsrcinfo > .SRCINFO
            chown -R $USER_ID:$GROUP_ID /pkg
          "

      - name: Commit and push to AUR
        run: |
          cd aur
          git config user.name "unstable-code"
          git config user.email "assa0620@gmail.com"
          git add PKGBUILD .SRCINFO
          git diff --staged --quiet || git commit -m "Update to ${{ steps.pkgver.outputs.version }}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur" git push origin master
