# Build stage jobs

build:makepkg:
  stage: build
  image: archlinux:latest
  extends: .source-changes-rules
  script:
    # Disable sandbox globally for Docker container compatibility
    - sed -i '/^\[options\]/a DisableSandbox' /etc/pacman.conf
    - pacman -Syu --noconfirm
    - grep -q '^DisableSandbox' /etc/pacman.conf || sed -i '/^\[options\]/a DisableSandbox' /etc/pacman.conf
    - pacman -S --noconfirm base-devel git sudo

    # Download actual PKGBUILD from AUR repository
    - git clone --depth=1 https://aur.archlinux.org/wshowlyrics-git.git /tmp/aur-pkg
    - cp /tmp/aur-pkg/PKGBUILD .

    # Modify PKGBUILD for CI environment
    - sed -i 's|source=.*|source=()|' PKGBUILD
    - sed -i 's|sha256sums=.*|sha256sums=()|' PKGBUILD
    - sed -i 's|cd "$srcdir/wshowlyrics"|cd "$startdir"|g' PKGBUILD

    # Create non-root user for makepkg
    - useradd -m builder
    - chown -R builder:builder .
    - |
      echo 'builder ALL=(ALL) NOPASSWD: /usr/bin/pacman' >> /etc/sudoers

    # Run makepkg with automatic dependency resolution
    - su builder -c "makepkg -sf --noconfirm"

    # Verify binary
    - |
      if [ ! -f build/lyrics ]; then
        echo "Error: lyrics binary not found"
        ls -la build/ || echo "build/ directory not found"
        exit 1
      fi
      echo "Build successful: lyrics binary created"
      ls -lh build/lyrics

    # Smoke tests
    - ./build/lyrics -h || true
    - |
      FILE_OUTPUT=$(file build/lyrics)
      echo "Binary info: $FILE_OUTPUT"
      if ! echo "$FILE_OUTPUT" | grep -q "ELF.*executable"; then
        echo "Error: Invalid binary format"
        exit 1
      fi
      echo "Binary format verified: ELF executable"

    # Verify installation files
    - |
      if [ ! -f wshowlyrics.service ]; then
        echo "Error: wshowlyrics.service not found"
        exit 1
      fi
      if ! grep -q "ExecStart=/usr/bin/wshowlyrics" wshowlyrics.service; then
        echo "Error: Invalid service file content"
        exit 1
      fi
      echo "Installation files verified"
      for pkg in *.pkg.tar.zst; do
        [ -f "$pkg" ] || continue
        echo "=== $pkg ==="
        tar -tvf "$pkg" | grep -E "(wshowlyrics|settings.ini|wshowlyrics.service)" || true
      done
      echo "Package contents verified"

build:fuzz:
  stage: build
  image: ubuntu:latest
  extends: .source-changes-rules
  variables:
    CC: clang
  script:
    - |
      apt-get update -qq
      apt-get install -y -qq clang meson ninja-build \
        libcairo2-dev libpango1.0-dev libwayland-dev wayland-protocols \
        libcurl4-openssl-dev libappindicator3-dev libgdk-pixbuf-2.0-dev \
        libssl-dev libjson-c-dev libglib2.0-dev

    # Build fuzz targets
    - meson setup build-fuzz -Dfuzzing=true
    - meson compile -C build-fuzz

    # Run fuzzers (60s each, suppress parser warnings to avoid 4MB log limit)
    - mkdir -p fuzz/artifacts/lrc fuzz/artifacts/lrcx fuzz/artifacts/srt
    - |
      run_fuzzer() {
        local name="$1"; shift
        echo "=== Running $name ==="
        "$@" 2>fuzz_${name}.log || { tail -50 fuzz_${name}.log; return 1; }
        grep -E "^(stat::|SUMMARY)" fuzz_${name}.log || true
      }
      run_fuzzer lrc ./build-fuzz/fuzz_lrc fuzz/corpus/lrc/ -artifact_prefix=fuzz/artifacts/lrc/ -max_total_time=60 -print_final_stats=1
      run_fuzzer lrcx ./build-fuzz/fuzz_lrcx fuzz/corpus/lrcx/ -artifact_prefix=fuzz/artifacts/lrcx/ -max_total_time=60 -print_final_stats=1
      run_fuzzer srt ./build-fuzz/fuzz_srt fuzz/corpus/srt/ -artifact_prefix=fuzz/artifacts/srt/ -max_total_time=60 -print_final_stats=1
  artifacts:
    when: on_failure
    paths:
      - fuzz/artifacts/
    expire_in: 30 days
