# Publish stage jobs

# ─── GitHub Release (tag-only) ────────────────────────────────────────

publish:github-release:
  stage: publish
  image: ubuntu:latest
  extends: .tag-only-rules
  needs:
    - job: package:deb:amd64
      artifacts: true
    - job: package:deb:arm64
      artifacts: true
    - job: package:rpm:x86_64
      artifacts: true
    - job: package:rpm:aarch64
      artifacts: true
    - job: package:appimage:x86_64
      artifacts: true
    - job: package:appimage:aarch64
      artifacts: true
  script:
    - VERSION="${CI_COMMIT_TAG#v}"

    - |
      apt-get update -qq
      apt-get install -y -qq curl jq

    # Install gh CLI
    - |
      curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
        -o /usr/share/keyrings/githubcli-archive-keyring.gpg
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
        > /etc/apt/sources.list.d/github-cli.list
      apt-get update -qq
      apt-get install -y -qq gh

    # Collect all artifacts
    - |
      mkdir -p release-assets
      find . -maxdepth 1 -name "wshowlyrics*" -type f -exec cp {} release-assets/ \;
      ls -lh release-assets/

    # Create GitHub Release
    - |
      cat > /tmp/release-body.md << EOF
      ## Release ${VERSION}

      ### Installation

      #### Debian/Ubuntu (.deb)
      \`\`\`bash
      # Download the appropriate .deb file for your architecture
      sudo dpkg -i wshowlyrics_${VERSION}_amd64.deb
      sudo apt-get install -f  # Install dependencies
      \`\`\`

      #### Fedora/RHEL (.rpm)
      \`\`\`bash
      # Download the appropriate .rpm file for your architecture
      sudo dnf install wshowlyrics-${VERSION}-1.fc*.rpm
      \`\`\`

      #### Universal (AppImage)
      \`\`\`bash
      # Download the appropriate AppImage file for your architecture
      chmod +x wshowlyrics-${VERSION}-x86_64.AppImage
      ./wshowlyrics-${VERSION}-x86_64.AppImage
      \`\`\`

      ### Package Verification

      All packages are signed with GPG key \`B4CD9B155AA3124C\`.

      #### Verify .deb
      \`\`\`bash
      dpkg-sig --verify wshowlyrics_${VERSION}_amd64.deb
      \`\`\`

      #### Verify .rpm
      \`\`\`bash
      rpm --checksig wshowlyrics-${VERSION}-1.fc*.rpm
      \`\`\`

      #### Verify AppImage
      \`\`\`bash
      gpg --verify wshowlyrics-${VERSION}-x86_64.AppImage.asc \\
                   wshowlyrics-${VERSION}-x86_64.AppImage
      \`\`\`
      EOF
    - |
      GH_TOKEN="$GITHUB_PAT" gh release create "$CI_COMMIT_TAG" \
        release-assets/* \
        --repo wshowlyrics/wshowlyrics \
        --title "v${VERSION}" \
        --notes-file /tmp/release-body.md \
        --generate-notes

# ─── NUR Unstable (nightly) ───────────────────────────────────────────

publish:nur-unstable:
  stage: publish
  image: nixos/nix:latest
  extends: .nontag-master-rules
  needs:
    - job: build:makepkg
      optional: true
    - job: build:fuzz
      optional: true
  variables:
    GIT_DEPTH: 0
  script:
    - COMMIT_HASH="$CI_COMMIT_SHA"
    - COMMIT_DATE=$(echo "$CI_COMMIT_TIMESTAMP" | cut -d'T' -f1)

    # Install tools missing from nixos/nix image
    - nix-env -iA nixpkgs.gnused nixpkgs.findutils

    # Calculate Nix hash, update unstable.nix, commit and push
    - |
      HASH_BASE32=$(nix-prefetch-url --unpack \
        "https://gitlab.com/wshowlyrics/wshowlyrics/-/archive/${COMMIT_HASH}/wshowlyrics-${COMMIT_HASH}.tar.gz" 2>&1 | tail -1)
      HASH_SRI=$(nix --extra-experimental-features nix-command hash convert --hash-algo sha256 --to sri "$HASH_BASE32")
      echo "Nix SRI hash: ${HASH_SRI}"

      git clone "https://oauth2:${NUR_PAT}@github.com/unstable-code/nur-packages.git" nur-packages
      cd nur-packages/pkgs/wshowlyrics
      sed -i "s|version = \"[^\"]*\";|version = \"${COMMIT_DATE}\";|" unstable.nix
      sed -i "s|rev = \"[^\"]*\";|rev = \"${COMMIT_HASH}\";|" unstable.nix
      sed -i "s|hash = \"[^\"]*\";|hash = \"${HASH_SRI}\";|" unstable.nix
      grep -E "version|rev|hash" unstable.nix | head -3

      cd "$CI_PROJECT_DIR/nur-packages"
      git config user.name "gitlab-ci[bot]"
      git config user.email "gitlab-ci[bot]@gitlab.com"
      git add pkgs/wshowlyrics/unstable.nix
      git diff --staged --quiet || git commit -m "wshowlyrics-unstable: ${COMMIT_DATE}"
      git push origin main || git push origin master

# ─── NUR Stable (tag) ────────────────────────────────────────────────

publish:nur-stable:
  stage: publish
  image: nixos/nix:latest
  extends: .tag-only-rules
  needs:
    - job: build:makepkg
    - job: build:fuzz
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    - nix-env -iA nixpkgs.gnused nixpkgs.findutils

    # Calculate Nix hash, update default.nix, commit and push
    - |
      HASH_BASE32=$(nix-prefetch-url --unpack \
        "https://gitlab.com/wshowlyrics/wshowlyrics/-/archive/${CI_COMMIT_TAG}/wshowlyrics-${CI_COMMIT_TAG}.tar.gz" 2>&1 | tail -1)
      HASH_SRI=$(nix --extra-experimental-features nix-command hash convert --hash-algo sha256 --to sri "$HASH_BASE32")
      echo "Nix SRI hash: ${HASH_SRI}"

      git clone "https://oauth2:${NUR_PAT}@github.com/unstable-code/nur-packages.git" nur-packages
      cd nur-packages/pkgs/wshowlyrics
      sed -i "s|version = \"[^\"]*\";|version = \"${VERSION}\";|" default.nix
      sed -i "s|rev = \"[^\"]*\";|rev = \"${CI_COMMIT_TAG}\";|" default.nix
      sed -i "s|hash = \"[^\"]*\";|hash = \"${HASH_SRI}\";|" default.nix
      grep -E "version|rev|hash" default.nix | head -3

      cd "$CI_PROJECT_DIR/nur-packages"
      git config user.name "gitlab-ci[bot]"
      git config user.email "gitlab-ci[bot]@gitlab.com"
      git add pkgs/wshowlyrics/default.nix
      git diff --staged --quiet || git commit -m "wshowlyrics: ${VERSION}"
      git push origin main || git push origin master

# ─── COPR Nightly ─────────────────────────────────────────────────────

publish:copr-nightly:
  stage: publish
  image: fedora:latest
  extends: .nontag-master-rules
  needs:
    - job: build:makepkg
      optional: true
    - job: build:fuzz
      optional: true
  variables:
    GIT_DEPTH: 0
  script:
    - dnf install -y copr-cli rpm-build rpmdevtools git

    # Setup COPR config
    - |
      mkdir -p ~/.config
      echo "$COPR_CONFIG" | base64 -d > ~/.config/copr
      chmod 600 ~/.config/copr

    # Package version
    - |
      VER=$(printf "r%s.%s" "$(git rev-list --count HEAD)" "$(git rev-parse --short HEAD)")
      COMMIT_SHORT=$(git rev-parse --short HEAD)
      CHANGELOG_DATE=$(date +"%a %b %d %Y")

    # Create .spec
    - |
      cat > wshowlyrics.spec << SPECEOF
      Name:           wshowlyrics
      Version:        ${VER}
      Release:        1%{?dist}
      Summary:        Wayland-native lyrics display with online fallback (nightly build)

      License:        GPL-3.0-or-later
      URL:            https://github.com/wshowlyrics/wshowlyrics
      Source0:        wshowlyrics-${VER}.tar.gz

      BuildRequires:  meson >= 0.48.0
      BuildRequires:  ninja-build
      BuildRequires:  gcc
      BuildRequires:  wayland-devel
      BuildRequires:  wayland-protocols-devel
      BuildRequires:  cairo-devel
      BuildRequires:  pango-devel
      BuildRequires:  libcurl-devel
      BuildRequires:  fontconfig-devel
      BuildRequires:  libappindicator-gtk3-devel
      BuildRequires:  gdk-pixbuf2-devel
      BuildRequires:  json-c-devel
      BuildRequires:  openssl-devel

      Requires:       libwayland-client
      Requires:       cairo
      Requires:       pango
      Requires:       libcurl
      Requires:       fontconfig
      Requires:       libappindicator-gtk3
      Requires:       gdk-pixbuf2
      Requires:       glib2
      Requires:       json-c
      Requires:       openssl-libs

      Suggests:       sway
      Suggests:       hyprland

      Provides:       wshowlyrics = %{version}-%{release}
      Conflicts:      wshowlyrics

      %description
      wshowlyrics is a lightweight lyrics overlay for Wayland compositors
      that displays synchronized lyrics for currently playing music.

      This is a nightly build from the latest master branch (commit ${COMMIT_SHORT}).

      Features:
      - MPRIS2 integration for music player detection
      - Local lyrics file support (.lrc, .lrcx, .srt)
      - Online lyrics fetching from lrclib.net
      - Karaoke-style word-level timing
      - AI-powered translation support
      - System tray integration with album art

      %prep
      %autosetup -n lyrics-${VER}

      %build
      %meson
      %meson_build

      %install
      %meson_install
      mv %{buildroot}%{_bindir}/lyrics %{buildroot}%{_bindir}/wshowlyrics

      %post
      %systemd_user_post wshowlyrics.service

      %preun
      %systemd_user_preun wshowlyrics.service

      %files
      %license LICENSE
      %doc README.md
      %{_bindir}/wshowlyrics
      %{_bindir}/wshowlyrics-offset
      %config(noreplace) %{_sysconfdir}/wshowlyrics/settings.ini
      %{_userunitdir}/wshowlyrics.service
      %{_datadir}/applications/wshowlyrics.desktop
      %{_datadir}/icons/hicolor/scalable/apps/wshowlyrics.svg

      %changelog
      * ${CHANGELOG_DATE} unstable-code <assa0620@gmail.com> - ${VER}-1
      - Nightly build from master branch (commit ${COMMIT_SHORT})
      SPECEOF

    # Create source tarball
    - git archive --format=tar.gz --prefix="lyrics-${VER}/" -o "wshowlyrics-${VER}.tar.gz" HEAD

    # Build SRPM
    - |
      mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
      cp "wshowlyrics-${VER}.tar.gz" ~/rpmbuild/SOURCES/
      cp wshowlyrics.spec ~/rpmbuild/SPECS/
      rpmbuild -bs ~/rpmbuild/SPECS/wshowlyrics.spec

    # Upload to COPR
    - |
      SRPM=$(find ~/rpmbuild/SRPMS -name "wshowlyrics-*.src.rpm" | head -1)
      copr-cli build unstable-code/wshowlyrics-nightly "$SRPM"

    - |
      echo "COPR nightly build submitted (version: ${VER})"
      echo "Build status: https://copr.fedorainfracloud.org/coprs/unstable-code/wshowlyrics-nightly/builds/"

