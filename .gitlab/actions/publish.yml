# ─── AUR Git (nightly) ───────────────────────────────────────────────

publish:aur-git:
  stage: publish
  image: archlinux:latest
  extends: .nontag-master-rules
  needs:
    - job: build:makepkg
      optional: true
    - job: build:fuzz
      optional: true
  variables:
    GIT_DEPTH: 0
  script:
    - pacman -Syu --noconfirm base-devel git openssh sudo

    # Package version
    - VER=$(printf "r%s.%s" "$(git rev-list --count HEAD)" "$(git rev-parse --short HEAD)")

    # Setup SSH for AUR
    - |
      mkdir -p ~/.ssh
      echo "$AUR_SSH_KEY" | base64 -d > ~/.ssh/aur
      chmod 600 ~/.ssh/aur
      ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

    # Clone AUR, update PKGBUILD, generate .SRCINFO, commit and push
    - |
      GIT_SSH_COMMAND="ssh -i ~/.ssh/aur" git clone ssh://aur@aur.archlinux.org/wshowlyrics-git.git aur
      cd aur
      sed -i "s/^pkgver=.*/pkgver=${VER}/" PKGBUILD
      sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

      useradd -m builder || true
      chown -R builder:builder .
      sudo -u builder makepkg --printsrcinfo > .SRCINFO
      chown -R root:root .

      git config user.name "unstable-code"
      git config user.email "assa0620@gmail.com"
      git add PKGBUILD .SRCINFO
      git diff --staged --quiet || git commit -m "Update to ${VER}"
      GIT_SSH_COMMAND="ssh -i ~/.ssh/aur" git push origin master

# ─── AUR Stable (tag) ────────────────────────────────────────────────

publish:aur-stable:
  stage: publish
  image: archlinux:latest
  extends: .tag-only-rules
  needs:
    - job: build:makepkg
    - job: build:fuzz
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    - pacman -Syu --noconfirm base-devel git openssh sudo pacman-contrib

    # Setup SSH for AUR
    - |
      mkdir -p ~/.ssh
      echo "$AUR_SSH_KEY" | base64 -d > ~/.ssh/aur
      chmod 600 ~/.ssh/aur
      ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

    # Clone AUR, update PKGBUILD, generate .SRCINFO, commit and push
    - |
      GIT_SSH_COMMAND="ssh -i ~/.ssh/aur -o StrictHostKeyChecking=accept-new" git clone ssh://aur@aur.archlinux.org/wshowlyrics.git aur
      cd aur
      sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
      sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

      useradd -m builder || true
      chown -R builder:builder .
      sudo -u builder updpkgsums
      sudo -u builder makepkg --printsrcinfo > .SRCINFO
      chown -R root:root .

      git config user.name "unstable-code"
      git config user.email "assa0620@gmail.com"
      git add PKGBUILD .SRCINFO
      git diff --staged --quiet || git commit -m "Update to version ${VERSION}"
      GIT_SSH_COMMAND="ssh -i ~/.ssh/aur -o StrictHostKeyChecking=accept-new" git push origin master

# ─── PPA (tag, jammy + noble) ────────────────────────────────────────

.ppa-script:
  script: &ppa-script
    - VERSION="${CI_COMMIT_TAG#v}"
    - |
      apt-get update -qq
      apt-get install -y -qq devscripts debhelper dput-ng gnupg2 git

    # Create debian directory
    - mkdir -p debian/source

    # debian/control
    - |
      cat > debian/control << 'EOF'
      Source: wshowlyrics
      Section: sound
      Priority: optional
      Maintainer: unstable-code <assa0620@gmail.com>
      Build-Depends: debhelper-compat (= 13),
                     meson (>= 0.48.0),
                     ninja-build,
                     libwayland-dev,
                     wayland-protocols,
                     libcairo2-dev,
                     libpango1.0-dev,
                     libcurl4-openssl-dev,
                     libfontconfig1-dev,
                     libappindicator3-dev,
                     libgdk-pixbuf-2.0-dev,
                     libjson-c-dev,
                     libssl-dev
      Standards-Version: 4.6.0
      Homepage: https://github.com/wshowlyrics/wshowlyrics
      Vcs-Git: https://github.com/wshowlyrics/wshowlyrics.git
      Vcs-Browser: https://github.com/wshowlyrics/wshowlyrics

      Package: wshowlyrics
      Architecture: any
      Depends: ${shlibs:Depends}, ${misc:Depends}
      Suggests: sway | hyprland
      Description: Wayland-native lyrics display with online fallback
       wshowlyrics is a lightweight lyrics overlay for Wayland compositors
       that displays synchronized lyrics for currently playing music.
       .
       Features:
        - MPRIS2 integration for music player detection
        - Local lyrics file support (.lrc, .lrcx, .srt)
        - Online lyrics fetching from lrclib.net
        - Karaoke-style word-level timing
        - AI-powered translation support
        - System tray integration with album art
      EOF

    # debian/rules
    - |
      cat > debian/rules << 'RULESEOF'
      #!/usr/bin/make -f

      %:
      	dh $@ --buildsystem=meson

      override_dh_auto_configure:
      	dh_auto_configure -- --prefix=/usr

      override_dh_auto_install:
      	dh_auto_install
      	mv debian/wshowlyrics/usr/bin/lyrics debian/wshowlyrics/usr/bin/wshowlyrics
      RULESEOF
    - chmod +x debian/rules

    # debian/copyright
    - |
      cat > debian/copyright << 'EOF'
      Format: https://www.debian.org/doc/packaging-manuals/copyright-format/1.0/
      Upstream-Name: wshowlyrics
      Upstream-Contact: unstable-code <assa0620@gmail.com>
      Source: https://github.com/wshowlyrics/wshowlyrics

      Files: *
      Copyright: 2024-2025 unstable-code <assa0620@gmail.com>
      License: GPL-3.0-or-later

      License: GPL-3.0-or-later
       This program is free software: you can redistribute it and/or modify
       it under the terms of the GNU General Public License as published by
       the Free Software Foundation, either version 3 of the License, or
       (at your option) any later version.
       .
       This program is distributed in the hope that it will be useful,
       but WITHOUT ANY WARRANTY; without even the implied warranty of
       MERCHANTABILITY or FITNESS FOR A PARTICULAR PURPOSE.  See the
       GNU General Public License for more details.
       .
       You should have received a copy of the GNU General Public License
       along with this program.  If not, see <https://www.gnu.org/licenses/>.
       .
       On Debian systems, the complete text of the GNU General Public
       License version 3 can be found in "/usr/share/common-licenses/GPL-3".
      EOF

    # debian/source/format
    - echo "3.0 (quilt)" > debian/source/format

    # Update changelog
    - |
      dch --create \
        --package wshowlyrics \
        --newversion "${VERSION}-1~${UBUNTU_RELEASE}1" \
        --distribution ${UBUNTU_RELEASE} \
        "Release ${VERSION}" \
        --force-distribution
      dch --release ""

    # Import GPG key
    - |
      echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --yes --import
      echo "use-agent" >> ~/.gnupg/gpg.conf
      echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
      gpg-agent --daemon --allow-preset-passphrase || true

    # Create orig tarball
    - git archive --format=tar.gz --prefix="wshowlyrics-${VERSION}/" -o "../wshowlyrics_${VERSION}.orig.tar.gz" HEAD

    # Build source package
    - debuild -S -sa -d -kB4CD9B155AA3124C

    # Setup dput
    - |
      cat > ~/.dput.cf << 'EOF'
      [wshowlyrics-ppa]
      fqdn = ppa.launchpad.net
      method = ftp
      incoming = ~unstable-code/ubuntu/wshowlyrics/
      login = anonymous
      allow_unsigned_uploads = 0
      EOF

    # Upload to PPA
    - |
      CHANGES_FILE="../wshowlyrics_${VERSION}-1~${UBUNTU_RELEASE}1_source.changes"
      dput wshowlyrics-ppa "$CHANGES_FILE"

    - |
      echo "PPA upload for ${UBUNTU_RELEASE} completed!"
      echo "Build status: https://launchpad.net/~unstable-code/+archive/ubuntu/wshowlyrics/+packages"

publish:ppa:jammy:
  stage: publish
  image: ubuntu:22.04
  extends: .tag-only-rules
  needs:
    - job: build:makepkg
    - job: build:fuzz
  variables:
    UBUNTU_RELEASE: jammy
    DEBIAN_FRONTEND: noninteractive
  script: *ppa-script

publish:ppa:noble:
  stage: publish
  image: ubuntu:24.04
  extends: .tag-only-rules
  needs:
    - job: build:makepkg
    - job: build:fuzz
  variables:
    UBUNTU_RELEASE: noble
    DEBIAN_FRONTEND: noninteractive
  script: *ppa-script
